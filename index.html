<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Filmtemperatur – Pfropfenströmung</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 12px;
  }
  label {
    display: block;
    margin: 8px 0;
  }
</style>
</head>
<body>

<label>
Vorlauftemperatur [100–300 °C]:
<input type="range" id="tv" min="100" max="300" value="180">
<span id="tvv"></span>
</label>

<label>
Pumpendrehzahl [%]:
<input type="range" id="p" min="20" max="100" step="20" value="20">
<span id="pv"></span>
</label>

<svg width="500" height="600">

  <!-- Hintergrund (für Alarm) -->
  <rect id="bg" x="0" y="0" width="500" height="600" fill="white"/>

  <!-- y-Achse Temperatur -->
  <line x1="60" y1="40" x2="60" y2="560" stroke="black"/>
  <polygon points="60,30 55,40 65,40" fill="black"/>
  <text x="8" y="35">ϑ [°C]</text>

  <!-- Skala 0–400 °C -->
  <g font-size="11">
    <script>
      for (let T = 0; T <= 400; T += 100) {
        const y = 560 - T;
        document.write(`
          <line x1="55" y1="${y}" x2="65" y2="${y}" stroke="black"/>
          <text x="22" y="${y + 4}">${T}</text>
        `);
      }
    </script>
  </g>

  <!-- ϑ Film, zul. -->
  <line x1="60" y1="240" x2="480" y2="240"
        stroke="black" stroke-dasharray="6,6"/>
  <text x="300" y="225">ϑ Film, zul. = 320 °C</text>

  <!-- Rohr (Außenkontur) -->
  <rect x="130" y="160" width="240" height="320"
        fill="none" stroke="black" stroke-width="2"/>
  <rect x="110" y="160" width="280" height="320"
        fill="none" stroke="black" stroke-width="2"/>

  <!-- Rohrwand schraffiert + Marker für Pfeile -->
  <defs>
    <pattern id="hatch" width="6" height="6"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6"
            stroke="black" stroke-width="1"/>
    </pattern>

    <!-- Arrowhead (hellgrau) -->
    <marker id="arrowHeadGrey" markerWidth="10" markerHeight="10"
            refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bdbdbd"></path>
    </marker>
  </defs>

  <!-- äußere Rohrwand -->
  <rect x="110" y="160" width="20" height="320" fill="url(#hatch)"/>
  <rect x="370" y="160" width="20" height="320" fill="url(#hatch)"/>

  <!-- innere Rohrkontur -->
  <rect x="130" y="160" width="240" height="320"
        fill="none" stroke="black"/>

  <!-- Kernströmung (Pfropfen) -->
  <line x1="250" y1="130" x2="250" y2="490"
        stroke="black" stroke-dasharray="6,6"/>
  <polygon points="250,130 245,150 255,150" fill="black"/>
  <!-- <polygon points="250,490 245,470 255,470" fill="black"/> Pfeil nach unten, auskommentiert -->

  <!-- =========================================================
       NEU: Strömungspfeile (3x), HINTER der roten Linie
       ========================================================= -->
  <g id="flowArrows" stroke="#bdbdbd" stroke-width="3" fill="none" opacity="0.8"
     marker-end="url(#arrowHeadGrey)">
    <!-- Koordinaten/Längen werden per JS gesetzt -->
    <line id="arr1" x1="0" y1="0" x2="0" y2="0"/>
    <line id="arr2" x1="0" y1="0" x2="0" y2="0"/>
    <line id="arr3" x1="0" y1="0" x2="0" y2="0"/>
  </g>

  <!-- =========================================================
       NEU: Grenzschicht-Markierung (dünn gestrichelt)
       ========================================================= -->
  <g id="blLines" stroke="#7f7f7f" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.9">
    <line id="blL" x1="0" y1="0" x2="0" y2="0"/>
    <line id="blR" x1="0" y1="0" x2="0" y2="0"/>
  </g>

  <!-- Temperaturprofil (liegt VOR Pfeilen + Grenzschichtlinien) -->
  <path id="curve"
        stroke="red"
        stroke-width="3"
        fill="none"/>

</svg>

<script>
const tvEl  = document.getElementById("tv");
const pEl   = document.getElementById("p");
const tvv   = document.getElementById("tvv");
const pv    = document.getElementById("pv");
const curve = document.getElementById("curve");
const bg    = document.getElementById("bg");

// neue Elemente
const arr1 = document.getElementById("arr1");
const arr2 = document.getElementById("arr2");
const arr3 = document.getElementById("arr3");
const blL  = document.getElementById("blL");
const blR  = document.getElementById("blR");

function update() {

  const tv = +tvEl.value;   // Vorlauf [°C]
  const p  = +pEl.value;    // 20 / 40 / 60 / 80 / 100 %

  tvv.textContent = tv + " °C";
  pv.textContent  = p + " %";

  /* ---------------------------
     Geometrie
  --------------------------- */
  const Di = 240;           // Innendurchmesser Rohr [px]
  const xL = 130;
  const xR = xL + Di;

  const innerTop    = 160;
  const innerBottom = 160 + 320;
  const innerH      = innerBottom - innerTop;

  /* ---------------------------
     Grenzschichtdicke δ
     Vorgabe:
     20 % → Di / 3
     dünner werdend bis ~0
  --------------------------- */
  const deltaMax = Di / 3;  // bei 20 %
  const deltaMin = 6;       // minimaler Restfilm

  const delta =
    deltaMin +
    (deltaMax - deltaMin) * (100 - p) / 80;

  const x1 = xL + delta;
  const x2 = xR - delta;

  /* ---------------------------
     Δθ_Film (DISKRET!)
  --------------------------- */
  const dThetaFilm = {
    20: 72.5,
    40: 41.6,
    60: 30.1,
    80: 23.9,
    100: 20.0
  }[p];

  /* ---------------------------
     Temperaturen
  --------------------------- */
  const Tcore = tv;                 // Pfropfen
  const Tfilm = Tcore + dThetaFilm; // Film

  const yCore = 560 - Tcore;
  const yFilm = 560 - Tfilm;

  /* ---------------------------
     Sicherheitslogik
  --------------------------- */
  bg.setAttribute(
    "fill",
    Tfilm > 320 ? "#ffd6d6" : "white"
  );

  /* ---------------------------
     Temperaturprofil
     (Pfropfenströmung)
  --------------------------- */
  curve.setAttribute("d", `
    M ${xL} ${yFilm}
    C ${xL} ${yCore},
      ${x1} ${yCore},
      ${x1} ${yCore}
    L ${x2} ${yCore}
    C ${x2} ${yCore},
      ${xR} ${yCore},
      ${xR} ${yFilm}
  `);

  /* =========================================================
     NEU 1: Grenzschicht-Linien (dünn gestrichelt)
     - markieren die Grenze zwischen Kern (Pfropf) und Grenzschicht
     - wandern mit delta (also mit Pumpenleistung)
     ========================================================= */
/*auskommentiert, sieht nicht gut aus
  blL.setAttribute("x1", x1);
  blL.setAttribute("x2", x1);
  blL.setAttribute("y1", innerTop);
  blL.setAttribute("y2", innerBottom);

  blR.setAttribute("x1", x2);
  blR.setAttribute("x2", x2);
  blR.setAttribute("y1", innerTop);
  blR.setAttribute("y2", innerBottom);'/

  /* =========================================================
     NEU 2: Strömungspfeile (3x hellgrau)
     - Start unten im Rohr, zeigen nach oben
     - Länge abhängig von Pumpenleistung
     - bei 100 %: 2/3 der Rohrhöhe
     - liegen hinter der roten Linie (SVG-Order)
     ========================================================= */
  const Lmax = innerH * (2/3);           // bei 100%
  const L    = Lmax * (p / 100);         // skaliert mit Pumpenleistung

  const yStart = innerBottom - 6;        // knapp über Rohrende
  const yEnd   = yStart - L;

  // Drei Pfeile im Innenraum verteilt (aber nicht in der Wand / nicht über Grenzschicht)
  const xA1 = xL + Di * 0.30;
  const xA2 = xL + Di * 0.50;
  const xA3 = xL + Di * 0.70;

  // arr1
  arr1.setAttribute("x1", xA1);
  arr1.setAttribute("y1", yStart);
  arr1.setAttribute("x2", xA1);
  arr1.setAttribute("y2", yEnd);

  // arr2
  arr2.setAttribute("x1", xA2);
  arr2.setAttribute("y1", yStart);
  arr2.setAttribute("x2", xA2);
  arr2.setAttribute("y2", yEnd);

  // arr3
  arr3.setAttribute("x1", xA3);
  arr3.setAttribute("y1", yStart);
  arr3.setAttribute("x2", xA3);
  arr3.setAttribute("y2", yEnd);
}

[tvEl, pEl].forEach(e => e.oninput = update);
update();
</script>

</body>
</html>
